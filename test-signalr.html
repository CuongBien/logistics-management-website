<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalR Tester - Logistics Flow</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px;}
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        button:hover { background: #0056b3; }
        .log-box { margin-top: 20px; background: #1e1e1e; padding: 15px; border-left: 5px solid #007bff; height: 400px; overflow-y: auto; border-radius: 4px; }
        .log-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .time { color: #888; font-size: 0.85em; }
        .status { font-weight: bold; color: #4CAF50; }
    </style>
    <!-- Thư viện SignalR qua CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>

<div class="container">
    <h2>📡 Live Tracking (SignalR)</h2>
    <p>Nhập <b>Access Token (JWT)</b> của bạn từ Swagger vào đây để kết nối với Notification Hub.</p>
    
    <label>Bearer Token:</label>
    <input type="text" id="tokenInput" placeholder="eyJhbGciOiJSUzI1NiIsInR5c... (Paste JWT Token here)">
    
    <button id="connectBtn" onclick="connect()">Connect to SignalR</button>
    <button onclick="document.getElementById('logs').innerHTML=''" style="background:#555">Clear</button>
    
    <h3 id="statusText" style="color: #ff9800;">Disconnected</h3>
    
    <div class="log-box" id="logs">
        <div style="color: #888;">// Log các sự kiện chuyển trạng thái đơn hàng sẽ hiển thị ở đây (Real-time)...</div>
    </div>
</div>

<script>
    let connection = null;

    async function connect() {
        const token = document.getElementById("tokenInput").value.trim();
        if(!token) {
            alert("Vui lòng nhập JWT Token trước nhé!");
            return;
        }

        document.getElementById("statusText").innerText = "Connecting...";
        document.getElementById("statusText").style.color = "yellow";

        // Khởi tạo kết nối tới Ordering API Hub
        connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5000/hubs/order", {
                accessTokenFactory: () => token // Gửi token lên để xác thực [Authorize]
            })
            .configureLogging(signalR.LogLevel.Information)
            .withAutomaticReconnect()
            .build();

        // Đăng ký Listener chờ tin nhắn từ Server 
        // Phải trùng với tên method: "ReceiveOrderStatusUpdate" mà Backend bắn ra
        connection.on("ReceiveOrderStatusUpdate", (orderId, newStatus, message) => {
            const time = new Date().toLocaleTimeString();
            const logHtml = `
                <div class="log-entry">
                    <span class="time">[${time}]</span> 
                    📦 Đơn hàng <b>${orderId}</b>: <br/>
                    Trạng thái: <span class="status">${newStatus}</span> <br/>
                    Thông điệp: <i>${message}</i>
                </div>
            `;
            const logsDiv = document.getElementById("logs");
            logsDiv.innerHTML = logHtml + logsDiv.innerHTML;
        });

        try {
            await connection.start();
            document.getElementById("statusText").innerText = "✅ Connected Successfully!";
            document.getElementById("statusText").style.color = "#4CAF50";
            document.getElementById("connectBtn").disabled = true;
            document.getElementById("connectBtn").style.background = "#4CAF50";
            document.getElementById("connectBtn").innerText = "Listening...";
        } catch (err) {
            console.error(err);
            document.getElementById("statusText").innerText = "❌ Connection Failed! Check Console (F12).";
            document.getElementById("statusText").style.color = "#f44336";
        }
    }
</script>

</body>
</html>
