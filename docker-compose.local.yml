version: "3.8"

services:
  # Main Application Database
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_oms_dev
    ports:
      - "56432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  # Keycloak Database (Separate container for isolation)
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: lms-postgres-keycloak
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
      POSTGRES_DB: keycloak
    ports:
      - "5434:5432"  # Different port to avoid conflict
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: lms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: lms
      RABBITMQ_DEFAULT_PASS: lms123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lms-network

  redis:
    image: redis:7.2-alpine
    platform: linux/amd64
    container_name: lms-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis123 ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lms-network

  seq:
    image: datalust/seq:latest
    platform: linux/amd64
    container_name: lms-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=Admin@123
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data
    networks:
      - lms-network

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: lms-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - lms-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: lms-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - lms-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: lms-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI
    networks:
      - lms-network

  oms.api:
    image: lms-oms-api
    build:
      context: .
      dockerfile: src/Services/OMS/OMS.Api/Dockerfile
    container_name: lms-oms-api
    ports:
      - "5000:8080"
    environment:
      - Swagger__ServerBasePath=/api/oms
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=lms_oms_dev;Username=postgres;Password=postgres
      - MessageBroker__RabbitMQ__Host=rabbitmq
      - MessageBroker__RabbitMQ__Username=lms
      - MessageBroker__RabbitMQ__Password=lms123
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - JwtOptions__Authority=http://keycloak:8080/realms/logistics_realm
      - JwtOptions__MetadataAddress=http://keycloak:8080/realms/logistics_realm/.well-known/openid-configuration
      - JwtOptions__Audience=oms-client
    depends_on:
      - postgres
      - rabbitmq
      - seq
      - keycloak
    networks:
      - lms-network

  wms.api:
    image: lms-wms-api
    build:
      context: .
      dockerfile: src/Services/WMS/WMS.Api/Dockerfile
    container_name: lms-wms-api
    ports:
      - "5051:8080"
    environment:
      - Swagger__ServerBasePath=/api/wms
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=lms_wms_dev;Username=postgres;Password=postgres
      - MessageBroker__RabbitMQ__Host=rabbitmq
      - MessageBroker__RabbitMQ__Username=lms
      - MessageBroker__RabbitMQ__Password=lms123
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - JwtOptions__Authority=http://keycloak:8080/realms/logistics_realm
      - JwtOptions__MetadataAddress=http://keycloak:8080/realms/logistics_realm/.well-known/openid-configuration
      - JwtOptions__Audience=oms-client
    depends_on:
      - postgres
      - rabbitmq
      - seq
      - keycloak
    networks:
      - lms-network

  gateway.api:
    image: lms-gateway-api
    build:
      context: .
      dockerfile: src/Services/Gateway/Gateway.Api/Dockerfile
    container_name: lms-gateway-api
    ports:
      - "8000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__oms-cluster__Destinations__oms-destination__Address=http://oms.api:8080
      - ReverseProxy__Clusters__wms-cluster__Destinations__wms-destination__Address=http://wms.api:8080
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - JwtOptions__Authority=http://keycloak:8080/realms/logistics_realm
      - JwtOptions__MetadataAddress=http://keycloak:8080/realms/logistics_realm/.well-known/openid-configuration
      - JwtOptions__Audience=oms-client
    depends_on:
      - oms.api
      - wms.api
    networks:
      - lms-network

volumes:
  postgres_data:
  postgres_keycloak_data:
  rabbitmq_data:
  seq_data:

networks:
  lms-network:
    driver: bridge